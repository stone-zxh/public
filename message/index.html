<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>留言 · cizen.net</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #647084;
      --line: #dfe5ee;
      --navy: #10233f;
      --blue: #2454a6;
      --blue-soft: #eef4ff;
      --green: #0f766e;
      --green-soft: #eaf8f4;
      --radius: 24px;
      --shadow: 0 22px 70px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(247, 249, 252, 0.95)),
        radial-gradient(circle at 18% 0%, rgba(36, 84, 166, 0.13), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(15, 118, 110, 0.1), transparent 26%),
        var(--bg);
      line-height: 1.65;
    }

    main {
      width: min(1280px, calc(100% - 48px));
      margin: 0 auto;
      padding: 34px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 68px;
      color: var(--muted);
      font-size: 14px;
    }

    .brand {
      color: var(--navy);
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .nav a {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
    }

    .nav a:hover,
    .nav a:focus-visible {
      border-color: var(--line);
      color: var(--navy);
      background: rgba(255, 255, 255, 0.74);
      outline: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 1fr);
      gap: 28px;
      align-items: start;
    }

    .hero {
      padding: 32px 0;
    }

    .eyebrow {
      width: fit-content;
      margin-bottom: 18px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(40px, 5.6vw, 76px);
      line-height: 1.06;
      letter-spacing: -0.04em;
    }

    .intro {
      max-width: 680px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 1.35vw, 20px);
      line-height: 1.72;
    }

    .notice {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 14px;
    }

    .notice strong {
      display: block;
      margin-bottom: 6px;
      color: var(--navy);
    }

    .panel {
      border: 1px solid rgba(223, 229, 238, 0.95);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    form {
      display: grid;
      gap: 18px;
      padding: 30px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--navy);
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--ink);
      background: #fbfcff;
      font: inherit;
    }

    input {
      min-height: 48px;
      padding: 0 14px;
    }

    textarea {
      min-height: 170px;
      padding: 13px 14px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(36, 84, 166, 0.55);
      outline: 3px solid rgba(36, 84, 166, 0.12);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    button {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      color: #ffffff;
      background: var(--navy);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    button:hover,
    button:focus-visible {
      background: #17345f;
      outline: none;
    }

    .preview {
      display: none;
      margin-top: -6px;
      padding: 14px;
      border-radius: 16px;
      color: var(--muted);
      background: var(--blue-soft);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .preview.is-visible {
      display: block;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 28px, 1280px);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 44px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <a class="brand" href="../">cizen.net</a>
      <nav class="nav" aria-label="页面导航">
        <a href="../">首页</a>
        <a href="../open/">公开分享</a>
        <a href="../invite/">邀请访问</a>
      </nav>
    </header>

    <div class="layout">
      <section class="hero" aria-labelledby="page-title">
        <div class="eyebrow">Message to Stone</div>
        <h1 id="page-title">给 Stone 留言</h1>
        <p class="intro">
          如果你对某个页面、观点或业务问题有反馈，可以在这里留下线索；提交后会打开 GitHub Issue 确认页，由你检查内容后正式发送。
        </p>
        <div class="notice">
          <strong>提交前请注意</strong>
          留言最终会进入 GitHub Issue，可能公开显示，并需要 GitHub 账号确认提交。
          请不要填写商业机密、个人敏感信息或不适合公开传播的内容。
        </div>
      </section>

      <section class="panel" aria-label="留言表单">
        <form id="message-form">
          <div class="field">
            <label for="name">昵称或称呼</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="例如：某某 / 同事 / 朋友">
          </div>

          <div class="field">
            <label for="contact">联系方式（可选）</label>
            <input id="contact" name="contact" type="text" autocomplete="email" placeholder="邮箱、微信或其它方便回复的方式">
            <p class="hint">如果不希望公开联系方式，可以留空，或只写你愿意公开的信息。</p>
          </div>

          <div class="field">
            <label for="title">留言标题</label>
            <input id="title" name="title" type="text" required placeholder="用一句话说明想聊什么">
          </div>

          <div class="field">
            <label for="body">留言内容</label>
            <textarea id="body" name="body" required placeholder="写下你的问题、建议、反馈或协作线索。"></textarea>
          </div>

          <div id="preview" class="preview" aria-live="polite"></div>
          <button type="submit">生成 GitHub 留言并确认提交</button>
        </form>
      </section>
    </div>
  </main>

  <script>
    const form = document.querySelector("#message-form");
    const preview = document.querySelector("#preview");
    const issueBase = "https://github.com/stone-zxh/public/issues/new";

    function fieldValue(name) {
      return new FormData(form).get(name)?.toString().trim() || "";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = fieldValue("name") || "匿名访客";
      const contact = fieldValue("contact") || "未提供";
      const title = fieldValue("title");
      const body = fieldValue("body");
      const issueTitle = `[留言] ${title}`;
      const issueBody = [
        "## 留言内容",
        body,
        "",
        "## 留言人",
        name,
        "",
        "## 联系方式",
        contact,
        "",
        "## 来源",
        "www.cizen.net/message/"
      ].join("\n");
      const params = new URLSearchParams({
        title: issueTitle,
        body: issueBody,
        labels: "message"
      });
      const url = `${issueBase}?${params.toString()}`;

      preview.textContent = "即将打开 GitHub Issue 确认页。请在 GitHub 页面检查内容后提交。";
      preview.classList.add("is-visible");
      window.open(url, "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>
