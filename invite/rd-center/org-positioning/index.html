    body { margin:0; min-height:100vh; color:var(--ink); font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif; background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(247,249,252,.94)),radial-gradient(circle at 18% 0%,rgba(36,84,166,.12),transparent 30%),radial-gradient(circle at 88% 12%,rgba(154,106,24,.12),transparent 26%),var(--bg); line-height:1.65; }

    .back { color:var(--blue); font-size:14px; }
    .eyebrow { width:fit-content; margin-bottom:18px; padding:7px 12px; border:1px solid var(--line); border-radius:999px; color:var(--gold); background:var(--gold-soft); font-size:14px; font-weight:800; }
    h1 { margin:0; color:var(--navy); font-size:clamp(38px,6vw,66px); line-height:1.08; letter-spacing:-.04em; }
    .intro { max-width:880px; margin:22px 0 0; color:var(--muted); font-size:clamp(18px,1.35vw,20px); line-height:1.72; }
    .panel { margin-top:34px; padding:30px; border:1px solid var(--line); border-radius:24px; background:rgba(255,255,255,.88); box-shadow:var(--shadow); }
    label { display:block; margin-bottom:10px; color:var(--navy); font-weight:800; }
    .form-row { display:grid; grid-template-columns:1fr auto; gap:12px; }
    input { min-height:50px; width:100%; padding:0 14px; border:1px solid var(--line); border-radius:14px; color:var(--ink); background:#fbfcff; font:inherit; }
    input:focus { border-color:rgba(36,84,166,.55); outline:3px solid rgba(36,84,166,.12); }
    button { min-height:50px; padding:0 18px; border:0; border-radius:14px; color:#fff; background:var(--navy); cursor:pointer; font:inherit; font-weight:800; }
    .hint { margin:12px 0 0; color:var(--muted); font-size:14px; }
    .message { display:none; margin-top:14px; padding:12px 14px; border-radius:14px; font-size:14px; }
    .message.error { display:block; color:var(--red); background:var(--red-soft); }
    .message.success { display:block; color:var(--green); background:var(--green-soft); }
    @media (max-width: 640px) { .topbar { align-items:flex-start; flex-direction:column; margin-bottom:48px; } .form-row { grid-template-columns:1fr; } }
