    .back { color:var(--blue); font-size:14px; }

    h1 { margin:0; color:var(--navy); font-size:clamp(38px,6vw,66px); line-height:1.08; letter-spacing:-.04em; }
    .intro { max-width:880px; margin:22px 0 0; color:var(--muted); font-size:clamp(18px,1.35vw,20px); line-height:1.72; }

    .form-row { display:grid; grid-template-columns:1fr auto; gap:12px; }
    input { min-height:50px; width:100%; padding:0 14px; border:1px solid var(--line); border-radius:14px; color:var(--ink); background:#fbfcff; font:inherit; }
    input:focus { border-color:rgba(36,84,166,.55); outline:3px solid rgba(36,84,166,.12); }
    button { min-height:50px; padding:0 18px; border:0; border-radius:14px; color:#fff; background:var(--navy); cursor:pointer; font:inherit; font-weight:800; }
    .hint { margin:12px 0 0; color:var(--muted); font-size:14px; }
    .message { display:none; margin-top:14px; padding:12px 14px; border-radius:14px; font-size:14px; }
    .message.error { display:block; color:var(--red); background:var(--red-soft); }
    .message.success { display:block; color:var(--green); background:var(--green-soft); }
    @media (max-width: 640px) { .topbar { align-items:flex-start; flex-direction:column; margin-bottom:48px; } .form-row { grid-template-columns:1fr; } }

    const saltBase64 = "MzBCz7zdG2YFCycJRDlckg==";
    const ivBase64 = "zEtIQeZFgTHe05ju";
    const iterations = 210000;
    const password = document.querySelector("#password");
    const unlock = document.querySelector("#unlock");
    const message = document.querySelector("#message");
    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }
    async function deriveKey(passphrase) {
      const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: fromBase64(saltBase64), iterations, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }
    function show(type, text) {
      message.className = "message " + type;
      message.textContent = text;
    }
    async function openDocument() {
      const passphrase = password.value;
      if (!passphrase) {
        show("error", "请输入文档密码。");
        return;
      }
      unlock.disabled = true;
      unlock.textContent = "解锁中...";
      try {
        const key = await deriveKey(passphrase);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: fromBase64(ivBase64) }, key, fromBase64(encryptedPayload));
        const html = new TextDecoder().decode(decrypted);
        show("success", "解锁成功，正在打开文档。");
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        show("error", "密码不正确，或文档无法解锁。");
      } finally {
        unlock.disabled = false;
        unlock.textContent = "解锁";
      }
    }
    unlock.addEventListener("click", openDocument);
    password.addEventListener("keydown", (event) => {
      if (event.key === "Enter") openDocument();
    });
