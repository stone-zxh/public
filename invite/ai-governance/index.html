  <title>AI治理机制业务项目操作手册 - 邀请访问</title>
  <style>
    :root { --bg: #f7f9fc; --panel: #ffffff; --ink: #172033; --muted: #647084; --line: #dfe5ee; --navy: #10233f; --blue: #2454a6; --gold: #9a6a18; --gold-soft: #fff8e8; --red: #b42318; --red-soft: #fff1f0; --green: #166534; --green-soft: #ecfdf3; --radius: 24px; --shadow: 0 22px 70px rgba(15, 23, 42, 0.08); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; background: linear-gradient(180deg, rgba(255,255,255,.86), rgba(247,249,252,.94)), radial-gradient(circle at 18% 0%, rgba(36,84,166,.11), transparent 30%), radial-gradient(circle at 88% 12%, rgba(154,106,24,.12), transparent 26%), var(--bg); line-height: 1.65; }
    main { width: min(760px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 54px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 84px; color: var(--muted); font-size: 14px; }
    .brand, .back { color: var(--navy); font-weight: 800; text-decoration: none; }
    .back { color: var(--blue); }
    .eyebrow { width: fit-content; margin-bottom: 18px; padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; color: var(--gold); background: var(--gold-soft); font-size: 14px; font-weight: 800; }
    h1 { max-width: 680px; margin: 0; color: var(--navy); font-size: clamp(38px, 6vw, 66px); line-height: 1.08; letter-spacing: -0.04em; }
    .intro { max-width: 660px; margin: 22px 0 0; color: var(--muted); font-size: 18px; }
    .panel { margin-top: 34px; padding: 30px; border: 1px solid rgba(223,229,238,.95); border-radius: var(--radius); background: rgba(255,255,255,.9); box-shadow: var(--shadow); }
    label { display: block; margin-bottom: 10px; color: var(--navy); font-weight: 900; }
    .form-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
    input { width: 100%; min-height: 50px; padding: 0 14px; border: 1px solid var(--line); border-radius: 14px; color: var(--ink); background: #fbfcff; font: inherit; }
    input:focus { border-color: rgba(36,84,166,.55); outline: 3px solid rgba(36,84,166,.12); }
    button { min-height: 50px; padding: 0 18px; border: 0; border-radius: 14px; color: #fff; background: var(--navy); cursor: pointer; font: inherit; font-weight: 900; }
    button:disabled { opacity: .65; cursor: wait; }
    .hint { margin: 12px 0 0; color: var(--muted); font-size: 14px; }
    .message { display: none; margin-top: 14px; padding: 12px 14px; border-radius: 14px; font-size: 14px; }
    .message.is-visible { display: block; }
    .message.error { color: var(--red); background: var(--red-soft); }
    .message.success { color: var(--green); background: var(--green-soft); }
    .safety-note { margin-top: 24px; color: var(--muted); font-size: 14px; }
    @media (max-width: 640px) { main { width: min(100% - 28px, 760px); } .topbar { align-items: flex-start; flex-direction: column; margin-bottom: 56px; } .form-row { grid-template-columns: 1fr; } }
  </style>

    const button = document.querySelector("#unlock-button");
    const message = document.querySelector("#message");

    function fromBase64(value) {
      return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
    }

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message is-visible " + type;

    async function deriveKey(password) {
      const encodedPassword = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", encodedPassword, "PBKDF2", false, ["deriveKey"]);

        { name: "PBKDF2", salt: fromBase64(saltPayload), iterations, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

      event.preventDefault();
      const password = input.value.trim();

      showMessage("正在解锁文档...", "success");
      try {
